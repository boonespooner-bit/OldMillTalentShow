<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boone Spooner - Music, Design and Product</title>
  <meta name="description" content="Boone Spooner - Product Manager, Design and Music">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Josefin Sans', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      user-select: none;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 100;
      letter-spacing: 0.15em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(180, 170, 210, 0.5);
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 0.15em;
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 200;
      letter-spacing: 0.3em;
      color: rgba(180, 175, 195, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5em;
    }

    .subtitle a {
      color: rgba(180, 175, 195, 0.55);
      text-decoration: none;
      transition: color 0.3s ease;
      cursor: pointer;
    }

    .subtitle a:hover {
      color: rgba(130, 120, 170, 0.9);
    }

    .subtitle .divider {
      font-weight: 100;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Boone Spooner</h1>
    <div class="subtitle">
      <a href="https://open.spotify.com/artist/6SIIdiMFuPQ2LXSYsS6Jdl" target="_blank" rel="noopener">music</a>
      <span class="divider">|</span>
      <a href="/portfolio/">design</a>
    </div>
  </div>
</body>
</html>
