services:
  - type: web
    name: boone-spooner-site
    runtime: static
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /portfolio
        destination: /portfolio/index.html
      - type: rewrite
        source: /portfolio/
        destination: /portfolio/index.html
